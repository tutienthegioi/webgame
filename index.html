<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Tu Tiên - Tiên Đạo Vấn Lộ</title>
    <!-- Thêm phông chữ cổ điển -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Playfair Display', serif;
            color: #e0d0a0; /* Màu vàng nhạt cổ điển */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a;
            z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease;
        }

        .splash-btn {
            background: transparent;
            color: #50c878; /* Xanh ngọc */
            border: 2px solid #50c878;
            padding: 20px 40px;
            font-size: 24px; font-family: 'Cinzel', serif;
            cursor: pointer; border-radius: 50px;
            transition: 0.3s;
        }
        .splash-btn:hover { background: #50c878; color: #000; box-shadow: 0 0 30px #50c878; }

        #video-background {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -100;
            object-fit: cover;
            filter: brightness(30%) contrast(1.2);
        }

        .container {
            max-width: 600px; width: 100%;
            background: rgba(20, 25, 20, 0.7);
            backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 20px;
            border: 2px solid #c5a059; /* Viền màu vàng đồng */
            box-shadow: 0 0 50px rgba(80, 200, 120, 0.2);
            text-align: center;
            animation: float 6s ease-in-out infinite;
        }

        h1 {
            color: #f4d03f; /* Vàng kim */
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(244, 208, 63, 0.5);
        }

        .btn-box { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }

        .btn {
            padding: 15px;
            border: 1px solid #c5a059;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            background: rgba(197, 160, 89, 0.2);
            transition: 0.4s;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .btn:hover {
            background: rgba(197, 160, 89, 0.8);
            transform: scale(1.02);
        }

        blockquote {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #50c878;
            padding: 15px;
            font-style: italic;
            text-align: left;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

<div id="splash-screen">
    <button class="splash-btn" onclick="kichHoatWeb()">Đăng Nhập Tiên Giới</button>
</div>

<video autoplay loop muted playsinline id="video-background">
    <source src="background.mp4" type="video/mp4">
</video>

<div class="container">
    <h1>MINECRAFT TU TIÊN</h1>
    <p>⚡ HÀNH TRÌNH ĐỘ KIẾP BẮT ĐẦU TỪ ĐÂY ⚡</p>
    
    <div class="btn-box">
        <a href="https://github.com/tutienthegioi/webgame/releases/download/v1.0/MinecraftLauncher.Setup.1.0.0.exe" class="btn">🚀 Tải Launcher Tu Tiên</a>
        <a href="https://github.com/tutienthegioi/webgame/releases/download/v1.0/CSL.Skin.Installer.exe" class="btn">🛠️ Tải Skin Tool</a>
    </div>

    <blockquote>
        📌 <strong>Đạo hữu lưu ý:</strong> Khi chạy Launcher, nếu Windows hiện cảnh báo, hãy bấm vào <strong>"More info"</strong> rồi chọn <strong>"Run anyway"</strong>. Chúc đạo hữu thuận lợi phi thăng!
    </blockquote>
</div>

<script>
    function kichHoatWeb() {
        const splash = document.getElementById('splash-screen');
        splash.style.opacity = '0';
        setTimeout(() => splash.style.display = 'none', 800);
    }
</script>

</body>
</html>
